spring:
  application:
    name: BatchBridge
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_IP:localhost}:3306/batch_bridge
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

ai:
  providers:
    google:
      api-key: ${GOOGLE_API_KEY:}
      model: ${GOOGLE_MODEL:gemini-1.5-flash}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-latest}
    xai:
      api-key: ${XAI_API_KEY:}
      model: ${XAI_MODEL:grok-2-latest}
